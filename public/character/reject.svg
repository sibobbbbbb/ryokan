  <line x1="148" y1="155" x2="120" y2="173" stroke="#ef4444" stroke-width="2" transform="rotate(-15, 135, 165)"/>
  <!-- Impact lines -->
  <line x1="158" y1="140" x2="168" y2="130" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <line x1="162" y1="145" x2="175" y2="140" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
</svg>
