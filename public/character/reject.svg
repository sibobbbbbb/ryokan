  <line x1="106" y1="75" x2="120" y2="69" stroke="#ef4444" stroke-width="2.5"/>
  <!-- Eyes - sharp -->
  <rect x="82" y="77" width="10" height="5" rx="0" fill="#ef4444"/>
  <rect x="106" y="77" width="10" height="5" rx="0" fill="#ef4444"/>
  <!-- Glasses -->
  <rect x="79" y="73" width="16" height="12" rx="1" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="103" y="73" width="16" height="12" rx="1" fill="none" stroke="#ef4444" stroke-width="1.5"/>
