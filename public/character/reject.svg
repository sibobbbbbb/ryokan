<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <rect x="60" y="115" width="72" height="75" rx="4" fill="#16161f" stroke="#ef4444" stroke-width="2"/>
  <path d="M80 115 L96 132 L112 115" stroke="#ef4444" stroke-width="2" fill="none"/>
