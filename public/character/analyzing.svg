<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Body leaning -->
  <rect x="65" y="112" width="70" height="78" rx="4" fill="#16161f" stroke="#7c6af7" stroke-width="1.5"/>
  <path d="M85 112 L100 132 L115 112" stroke="#7c6af7" stroke-width="1.5" fill="none"/>
  <!-- Head slightly forward -->
  <rect x="70" y="50" width="58" height="60" rx="6" fill="#1c1c28" stroke="#7c6af7" stroke-width="2"/>
  <!-- Eyes - narrowed/focused -->
  <rect x="82" y="76" width="14" height="4" rx="1" fill="#7c6af7"/>
  <rect x="104" y="76" width="14" height="4" rx="1" fill="#7c6af7"/>
  <!-- Glasses glowing -->
  <rect x="79" y="72" width="20" height="11" rx="2" fill="none" stroke="#7c6af7" stroke-width="1.5"/>
  <rect x="101" y="72" width="20" height="11" rx="2" fill="none" stroke="#7c6af7" stroke-width="1.5"/>
  <line x1="99" y1="77" x2="101" y2="77" stroke="#7c6af7" stroke-width="1.5"/>
  <!-- Focused mouth -->
  <path d="M88 97 Q100 94 112 97" stroke="#5a5a70" stroke-width="1.5" fill="none"/>
  <!-- Chart in background -->
  <rect x="20" y="60" width="40" height="30" rx="2" fill="#1c1c28" stroke="#5a5a70" stroke-width="1" opacity="0.7"/>
  <polyline points="25,82 30,75 35,78 40,68 45,72 50,65 55,70" stroke="#7c6af7" stroke-width="1.5" fill="none"/>
  <!-- Pulse dots -->
  <circle cx="170" cy="80" r="3" fill="#7c6af7" opacity="0.8"/>
  <circle cx="180" cy="80" r="3" fill="#7c6af7" opacity="0.5"/>
  <circle cx="190" cy="80" r="3" fill="#7c6af7" opacity="0.2"/>
</svg>
